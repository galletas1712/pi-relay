[workspace]
members = [
	"crates/agent-protocol",
	"crates/orchestrator-core",
	"crates/relay-core-host",
	"crates/session-core",
	"crates/session-core-host",
]
resolver = "2"

[workspace.package]
edition = "2021"
publish = false

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
