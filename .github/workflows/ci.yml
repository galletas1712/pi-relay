name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust fmt/check/test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --manifest-path rust/Cargo.toml --all --check
      - name: Check workspace
        run: cargo check --manifest-path rust/Cargo.toml --workspace --all-targets
      - name: Test workspace (non-PostgreSQL coverage)
        run: cargo test --manifest-path rust/Cargo.toml --workspace -- --nocapture

  frontend:
    name: Frontend test/build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # package-lock.json is the canonical CI lockfile. bun.lock remains
      # checked in because infra/dev.sh is the local Bun-based stack runner.
      - run: npm ci
      - run: npm test --workspaces --if-present
      - run: npm run build --workspace @pi-relay/web

  postgres:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pi_relay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pi_relay"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run PostgreSQL-backed tests
        env:
          # The postgres role can CREATE/DROP the isolated databases used by
          # the tests. This job is intentionally separate from ordinary Rust
          # coverage, whose DB tests report SKIPPED when this variable is absent.
          PI_RELAY_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: cargo test --manifest-path rust/Cargo.toml --workspace -- --include-ignored --nocapture
