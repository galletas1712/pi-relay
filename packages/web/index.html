<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="color-scheme" content="light dark" />
		<link rel="icon" href="data:," />
		<title>pi relay</title>
		<script>
			(function () {
				try {
					// Only an explicit user override pins a theme via a class.
					// With no override we add no class and let the CSS
					// `prefers-color-scheme` media query follow the system
					// preference live (it re-evaluates when the OS theme flips
					// while the tab is open).
					var stored = localStorage.getItem("pi-relay-theme");
					if (stored === "dark") document.documentElement.classList.add("dark");
					else if (stored === "light") document.documentElement.classList.add("light");
				} catch (_) {
					/* localStorage may be unavailable */
				}
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
