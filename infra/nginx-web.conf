server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# Same-origin websocket for Tailscale/serve and any non-loopback host.
	# Keep the upgrade on nginx→control (HTTP/1.1) so Tailscale's HTTP/2
	# frontend does not have to terminate the websocket itself.
	location = /ws {
		proxy_pass http://control:8787;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_read_timeout 86400s;
	}

	# Workspace routes are client-side; fall back to the SPA shell.
	location / {
		try_files $uri $uri/ /index.html;
	}

	location = /index.html {
		add_header Cache-Control "no-store";
	}
}
