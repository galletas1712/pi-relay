services:
  postgres:
    image: postgres:16-alpine
    container_name: pi-relay-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pi_relay
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pi_relay"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  control:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: ["pi-agentd"]
    environment:
      HOME: /root
      XDG_CONFIG_HOME: /config
    ports:
      - "127.0.0.1:8787:8787"
      # Runtime listener, published so the host-side pi-runtime (not dockerized;
      # it needs full host filesystem + toolchain access) can dial in.
      - "127.0.0.1:8786:8786"
    volumes:
      # Host-owned workflows, subagent roles, and role model frontmatter.
      - ${PI_AGENTD_CONFIG_HOME:-${HOME}/.config/pi-relay/agentd}:/config/pi-relay/agentd:ro
      # Container-specific database/bind policy overrides the host config file.
      - ./config/control.toml:/config/pi-relay/agentd/config.toml:ro
      # Host LLM credentials (read-only). The daemon reads ~/.codex/auth.json
      # (+installation_id) and ~/.claude*/config for the sk-ant- key. Read-only
      # so the container never rewrites auth.json as root and locks out the host
      # Codex CLI; the dir mount still reflects the host CLI's token refreshes.
      - ${HOME}/.codex:/root/.codex:ro
      - ${HOME}/.claude/config.json:/root/.claude/config.json:ro
      - ${HOME}/.claude.json:/root/.claude.json:ro
      # No mcp.toml or state mount: MCP (server inventory + OAuth credential
      # store) now runs on the host-side pi-runtime next to tool execution, so
      # the control plane's only persisted state is Postgres.
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    ports:
      - "127.0.0.1:${WEB_PORT:-8788}:80"
    restart: unless-stopped

  # NOTE: pi-runtime is intentionally NOT a service here. It executes the
  # session's tools in your real host environment (arbitrary local-workspace
  # source_paths, your toolchain/venvs) and needs root for btrfs subvolumes,
  # so it runs as a host process launched by infra/dev.sh, dialing the control
  # runtime listener published above on 127.0.0.1:8786.

volumes:
  pgdata:
