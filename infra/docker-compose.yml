services:
  postgres:
    image: postgres:16-alpine
    container_name: pi-relay-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pi_relay
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pi_relay"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

volumes:
  pgdata:
