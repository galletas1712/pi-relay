services:
  postgres:
    image: postgres:16-alpine
    container_name: pi-relay-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pi_relay
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pi_relay"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  control:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: ["pi-agentd"]
    environment:
      HOME: /root
      XDG_CONFIG_HOME: /config
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./config/control.toml:/config/pi-relay/config.toml:ro
      - control-state:/root/.local/state/pi-relay
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  runtime:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: ["pi-runtime", "/config/runtime.toml"]
    privileged: true
    volumes:
      - ./config/runtime.toml:/config/runtime.toml:ro
      - ${PI_RUNTIME_ROOT:?set PI_RUNTIME_ROOT to a host directory on btrfs}:/var/lib/pi-runtime
      - ..:/sources/pi-relay:ro
    depends_on:
      - control
    restart: unless-stopped

volumes:
  pgdata:
  control-state:
