services:
  postgres:
    image: postgres:16-alpine
    container_name: pi-relay-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pi_relay
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pi_relay"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  control:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: ["pi-agentd"]
    environment:
      HOME: /root
      XDG_CONFIG_HOME: /config
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./config/control.toml:/config/pi-relay/config.toml:ro
      # Daemon state on the host, not an ephemeral volume. The control plane's
      # only persisted state here is mcp-oauth-credentials.json, so prior MCP
      # logins carry over and token refreshes (atomic rename) persist to host.
      - ${HOME}/.local/state/pi-relay:/root/.local/state/pi-relay
      # Host LLM credentials (read-only). The daemon reads ~/.codex/auth.json
      # (+installation_id) and ~/.claude*/config for the sk-ant- key. Read-only
      # so the container never rewrites auth.json as root and locks out the host
      # Codex CLI; the dir mount still reflects the host CLI's token refreshes.
      - ${HOME}/.codex:/root/.codex:ro
      - ${HOME}/.claude/config.json:/root/.claude/config.json:ro
      - ${HOME}/.claude.json:/root/.claude.json:ro
      # MCP server definitions. The daemon enables MCP only when
      # <config_root>/mcp.toml exists; without this the inventory (new-session
      # selection menu) is empty. Servers live in the host's real config.
      - ${HOME}/.config/pi-relay/mcp.toml:/config/pi-relay/mcp.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  runtime:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: ["pi-runtime", "/config/runtime.toml"]
    privileged: true
    volumes:
      - ./config/runtime.toml:/config/runtime.toml:ro
      - ${PI_RUNTIME_ROOT:?set PI_RUNTIME_ROOT to a host directory on btrfs}:/var/lib/pi-runtime
      - ..:/sources/pi-relay:ro
    depends_on:
      - control
    restart: unless-stopped

volumes:
  pgdata:
